<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>资金流向 - 陈浩南</title>
<style>
:root{--bg:#0f1117;--card:#161a24;--text:#e0e0e0;--sub:#888;--border:#1e2230;--green:#34c759;--red:#ff3b30;--shadow:0 2px 8px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;min-height:100vh}
.header{background:linear-gradient(180deg,#1a1a3e,#0f1117);padding:18px 16px 14px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:19px;font-weight:800}.header .sub{font-size:10px;color:var(--sub);margin-top:3px}
.header .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-right:4px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
/* 概览 */
.overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:10px 12px}
.ov-card{background:var(--card);border-radius:10px;padding:12px 8px;text-align:center;border:1px solid var(--border)}
.ov-val{font-size:18px;font-weight:800}.ov-label{font-size:9px;color:var(--sub);margin-top:2px}
.up{color:var(--red)}.down{color:var(--green)}
/* 摘要 */
.summary{background:var(--card);border-radius:12px;padding:12px 14px;margin:0 12px 10px;border:1px solid var(--border);white-space:pre-line;font-size:12px;line-height:1.7}
/* 板块列表 */
.sec-title{font-size:13px;font-weight:700;padding:12px 14px 8px;display:flex;align-items:center;gap:6px}
.bar-list{padding:0 12px 14px}
.bar-item{background:var(--card);border-radius:10px;padding:11px 12px;margin-bottom:6px;border:1px solid var(--border);position:relative;overflow:hidden}
.bar-item .bar-bg{position:absolute;left:0;top:0;height:100%;opacity:0.08;border-radius:10px;transition:width 0.5s ease}
.bar-item .bar-bg.inflow{background:var(--red)}.bar-item .bar-bg.outflow{background:var(--green)}
.bar-row{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.bar-rank{min-width:20px;text-align:center;font-weight:700;font-size:11px;color:var(--sub)}.bar-rank.r1{color:var(--red)}.bar-rank.r2{color:#ff6b4a}.bar-rank.r3{color:#ff9500}
.bar-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-money{text-align:right;font-size:13px;font-weight:600;white-space:nowrap}
.bar-extra{display:flex;align-items:center;gap:10px;margin-top:6px;position:relative;z-index:1}
.bar-progress{flex:1;height:4px;border-radius:2px;background:var(--border);overflow:hidden}
.bar-progress-fill{height:100%;border-radius:2px;transition:width 0.5s ease}.bar-progress-fill.in{background:var(--red)}.bar-progress-fill.out{background:var(--green)}
.bar-ratio{font-size:10px;color:var(--sub);white-space:nowrap}
.bar-change{font-size:11px;font-weight:500;white-space:nowrap}

/* 两列 */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px}
.cols .bar-item{padding:8px}.cols .bar-name{font-size:11px}.cols .bar-money{font-size:11px}
.footer{text-align:center;padding:18px;color:var(--sub);font-size:9px;line-height:1.8}
.loading{text-align:center;padding:60px 20px;color:var(--sub)}.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header"><h1>💰 板块资金流向</h1><div class="sub"><span class="dot"></span><span id="update-info">加载中...</span> · 陈浩南制作</div></div>
<div id="app"><div class="loading"><div class="spinner"></div><br>正在加载资金流向...</div></div>
<div class="footer">数据来源：东方财富 | 盘后自动更新<br>陈浩南 © 2026 · 投资有风险仅供参考</div>

<script>
var data=null;
async function load(){try{var r=await fetch('fund.json');if(!r.ok)throw new Error();data=await r.json();render()}catch(e){document.getElementById('app').innerHTML='<div class="loading">⚠️ 加载失败<br><button onclick="load()" style="margin-top:8px;padding:8px 16px;border-radius:14px;border:none;background:var(--red);color:#fff;cursor:pointer;font-size:12px">重试</button></div>'}}

function render(){
  var d=new Date(data.updated);document.getElementById('update-info').textContent='更新于 '+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  var ov=data.overview||{},mf=data.marketFlow||{},nb=data.northBound||{};
  var h='';

  // 概览
  var netClr=ov.netFlow>=0?'up':'down',nbClr=(nb&&nb.netIn>=0)?'up':'down',mfClr=(mf&&mf.mainNetIn>=0)?'up':'down';
  h+='<div class="overview"><div class="ov-card"><div class="ov-val '+netClr+'">'+(ov.netFlow>=0?'+':'')+fmtY(ov.netFlow)+'亿</div><div class="ov-label">板块主力净流入</div></div><div class="ov-card"><div class="ov-val '+nbClr+'">'+(nb?fmtY(nb.netIn):'-')+'亿</div><div class="ov-label">北向资金</div></div><div class="ov-card"><div class="ov-val '+mfClr+'">'+(mf?fmtY(mf.mainNetIn):'-')+'亿</div><div class="ov-label">大盘主力资金</div></div></div>';

  // 摘要
  if(data.summary)h+='<div class="summary">'+esc(data.summary)+'</div>';

  // 行业板块资金流（带横向柱状图）
  var sectors=(data.sectors||[]).slice(0,20);
  var maxIn=0,maxOut=0;sectors.forEach(function(s){if(s.mainNetIn>maxIn)maxIn=s.mainNetIn;if(Math.abs(s.mainNetIn)>maxOut)maxOut=Math.abs(s.mainNetIn)});
  h+='<div class="sec-title">🏭 行业板块资金流向</div><div class="bar-list">';
  sectors.forEach(function(s,i){
    var rc=i<3?' r'+(i+1):'',isIn=s.mainNetIn>=0,mc=isIn?'up':'down';
    var barW=isIn?(maxIn>0?s.mainNetIn/maxIn*100:0):(maxOut>0?Math.abs(s.mainNetIn)/maxOut*100:0);
    h+='<div class="bar-item"><div class="bar-bg '+(isIn?'inflow':'outflow')+'" style="width:'+barW+'%"></div>';
    h+='<div class="bar-row"><span class="bar-rank'+rc+'">'+(i+1)+'</span><span class="bar-name">'+esc(s.name)+'</span><span class="bar-money '+mc+'">'+(isIn?'+':'')+fmtY(s.mainNetIn)+'亿</span></div>';
    h+='<div class="bar-extra"><div class="bar-progress"><div class="bar-progress-fill '+(isIn?'in':'out')+'" style="width:'+Math.abs(s.mainNetInRatio||0)+'%"></div></div><span class="bar-ratio">'+(s.mainNetInRatio||0).toFixed(2)+'%</span><span class="bar-change '+(s.change>=0?'up':'down')+'">'+(s.change>=0?'+':'')+(s.change||0).toFixed(2)+'%</span></div></div>';
  });h+='</div>';

  // 概念+个股
  h+='<div class="cols"><div><div class="sec-title">💡 概念板块</div><div class="bar-list">';
  (data.concepts||[]).slice(0,8).forEach(function(s,i){var mc=s.mainNetIn>=0?'up':'down';h+='<div class="bar-item"><div class="bar-row"><span class="bar-rank">'+(i+1)+'</span><span class="bar-name">'+esc(s.name)+'</span><span class="bar-money '+mc+'">'+fmtY(s.mainNetIn)+'亿</span></div></div>'});h+='</div></div>';
  h+='<div><div class="sec-title">📈 个股流入Top</div><div class="bar-list">';
  (data.stockInTop||[]).slice(0,8).forEach(function(s,i){h+='<div class="bar-item"><div class="bar-row"><span class="bar-rank">'+(i+1)+'</span><span class="bar-name">'+esc(s.name)+'</span><span class="bar-money up">+'+fmtY(s.mainNetIn)+'亿</span></div></div>'});h+='</div></div></div>';

  document.getElementById('app').innerHTML=h
}

function fmtY(v){return v?(Math.abs(v)/100000000).toFixed(2):'0.00'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

load();
</script>
</body>
</html>
