name: 更新资金流向数据

on:
  schedule:
    # 交易日盘后更新（北京时间15:30,16:00,17:00 = UTC 7:30,8:00,9:00）
    - cron: '30,0 7-9 * * 1-5'
    # 盘前再更新一次确保有最新数据（北京时间8:00 = UTC 0:00）
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 抓取资金流向
        run: node update-fund.js
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fund.json
          git diff --staged --quiet || git commit -m "更新资金流向 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push
